<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact-Laborator 2</title>
</head>
<body>
    <a href="#main-content">Sari la conținutul principal</a>

    <header>
        <h1>Conectează-mă</h1>
        <nav aria-label="Navigație principală">
            <ul>
                <li><a href="index.html">Acasă</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main id = "main-content">
        <section>
            <h2>Completează formularul</h2>
            <form aria-label="Formular de contact" action = "#" method="post">
                <fieldset>
                    <legend>Detalii personale</legend>

                    <label for="nume">Nume complet (obligatoriu):</label>
                    <input type="text" id="nume" name="nume" required>

                    <label for="email">Email (obligatoriu):</label>
                    <input type="email" id="email" name="email" required>

                    <label for="telefon">Telefon(obțional):</label>
                    <input type="tel" id="telefon" name="telefon">
                </fieldset>

                <fieldset>
                    <legend>Mesajul tău</legend>

                    <label for="subiect">Subiect(obligatoriu):</label>
                    <input type="text" id="subiect" name="subiect" required>

                    <label for="mesaj">Mesaj (obligatoriu):</label>
                   
                    <p id="mesaj-ajutor">Te rugăm să oferi cât mai multe detalii.</p>
                    <textarea id="mesaj" name="mesaj" required aria-describedby="mesaj-ajutor"></textarea>
                </fieldset>

                <fieldset>
                    <legend>Cum ai auzit de noi?</legend>

                    <input type="radio" id="sursa-social" name="sursa" value="cautare" required>
                    <label for="sursa-social">Rețele sociale</label><br>

                    <input type="radio" id="sursa-cautare" name="sursa" value="cautare">
                    <label for="sursa-cautare">Motor de căutare</label><br>

                    <input type="radio" id="sursa-prieten" name="sursa" value="prieten">
                    <label for="sursa-prieten">De la un prieten</label>
                </fieldset>
                <button type="submit">Trimite mesajul</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Racz Roberta. Laboratorul 2.</p>
    </footer>
</body>
</html>
